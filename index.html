<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>삼국지 천하결전 — 통합 메타 · 편성 · 전법 · 덱빌더</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23b23a2e'/%3E%3Ctext x='50' y='72' font-size='64' text-anchor='middle' fill='white' font-family='serif'%3E天%3C/text%3E%3C/svg%3E">
<meta name="description" content="삼국지 천하결전 통합 메타 사이트 — 시즌별 편성·전법 도감·장수 도감·덱빌더">
<meta name="color-scheme" content="light dark">
<style>
:root{
 --paper:#fff;--bg:#e7e2d6;--ink:#1b1712;--soft:#5f574a;--faint:#8b8375;--line:#e2d9c6;--line2:#c8bda3;--panel:#faf7f0;--panel2:#f1eadb;
 --seal:#b23a2e;--seal2:#8e2c22;--jade:#3f7a5e;--bronze:#9c7a33;--new:#7a58a3;--newbg:#efe7f6;
 --wei:#2f6091;--shu:#3f7a5e;--wu:#b24a34;--qun:#8f6e22;
 --cmd:#2f6091;--act:#b23a2e;--pas:#3f7a5e;--chase:#8f6e22;--leg:#a8842f;--hero:#7a58a3;--rare:#6b7075;
 --t0:#8e2c22;--t1:#9c7a33;--t2:#6b7075;
}
@media(prefers-color-scheme:dark){:root{
 --paper:#17140f;--bg:#0e0c09;--ink:#ece4d3;--soft:#b1a68d;--faint:#8a806f;--line:#2c2619;--line2:#463f2d;--panel:#1d190f;--panel2:#241f13;
 --seal:#df6555;--seal2:#c0553b;--jade:#5fa37e;--bronze:#c7a250;--new:#b394de;--newbg:#2a2233;
 --wei:#5a93c9;--shu:#6fb48c;--wu:#e07458;--qun:#c7a250;
 --cmd:#5a93c9;--act:#df6555;--pas:#5fa37e;--chase:#c7a250;--leg:#c7a250;--hero:#b394de;--rare:#9aa0a6;
 --t0:#df6555;--t1:#c7a250;--t2:#9aa0a6;
}}
:root[data-theme=light]{--paper:#fff;--bg:#e7e2d6;--ink:#1b1712;--soft:#5f574a;--faint:#8b8375;--line:#e2d9c6;--line2:#c8bda3;--panel:#faf7f0;--panel2:#f1eadb;--seal:#b23a2e;--seal2:#8e2c22;--jade:#3f7a5e;--bronze:#9c7a33;--new:#7a58a3;--newbg:#efe7f6;--wei:#2f6091;--shu:#3f7a5e;--wu:#b24a34;--qun:#8f6e22;--cmd:#2f6091;--act:#b23a2e;--pas:#3f7a5e;--chase:#8f6e22;--leg:#a8842f;--hero:#7a58a3;--rare:#6b7075;--t0:#8e2c22;--t1:#9c7a33;--t2:#6b7075;}
:root[data-theme=dark]{--paper:#17140f;--bg:#0e0c09;--ink:#ece4d3;--soft:#b1a68d;--faint:#8a806f;--line:#2c2619;--line2:#463f2d;--panel:#1d190f;--panel2:#241f13;--seal:#df6555;--seal2:#c0553b;--jade:#5fa37e;--bronze:#c7a250;--new:#b394de;--newbg:#2a2233;--wei:#5a93c9;--shu:#6fb48c;--wu:#e07458;--qun:#c7a250;--cmd:#5a93c9;--act:#df6555;--pas:#5fa37e;--chase:#c7a250;--leg:#c7a250;--hero:#b394de;--rare:#9aa0a6;--t0:#df6555;--t1:#c7a250;--t2:#9aa0a6;}
*{box-sizing:border-box;}html,body{margin:0;}
body{background:var(--bg);color:var(--ink);font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;line-height:1.55;font-size:14px;-webkit-text-size-adjust:100%;}
.serif{font-family:"Nanum Myeongjo","Apple SD Gothic Neo",Batang,Georgia,serif;}
.cn{font-family:"Nanum Myeongjo",Batang,serif;color:var(--faint);}
.num{font-variant-numeric:tabular-nums;}
a{color:var(--seal);}
/* header */
header{position:sticky;top:0;z-index:20;background:var(--paper);border-bottom:2px solid var(--ink);}
.hbar{max-width:1180px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px;}
.logo{display:flex;align-items:center;gap:9px;font-family:"Nanum Myeongjo",serif;font-weight:800;font-size:17px;white-space:nowrap;}
.logo .mk{width:30px;height:30px;border:2px solid var(--seal);border-radius:7px;color:var(--seal);display:grid;place-content:center;font-size:12px;transform:rotate(-3deg);}
.logo em{font-style:normal;color:var(--seal);}
.hbar .sp{flex:1;}
.tbtn{font-family:inherit;font-size:12px;padding:5px 10px;border-radius:100px;border:1px solid var(--line2);background:var(--paper);color:var(--ink);cursor:pointer;}
nav.tabs{max-width:1180px;margin:0 auto;padding:0 10px 8px;display:flex;gap:4px;overflow-x:auto;}
nav.tabs button{font-family:inherit;font-size:13px;font-weight:700;padding:6px 13px;border-radius:100px;border:1px solid transparent;background:transparent;color:var(--soft);cursor:pointer;white-space:nowrap;}
nav.tabs button.on{background:var(--ink);color:var(--paper);}
main{max-width:1180px;margin:0 auto;padding:18px 16px 90px;}
section{display:none;}section.on{display:block;}
h2.head{font-family:"Nanum Myeongjo",serif;font-size:22px;font-weight:800;margin:0 0 4px;}
p.sub{color:var(--soft);font-size:12.5px;margin:0 0 16px;max-width:80ch;}
h3.sub2{font-size:15px;font-weight:800;margin:24px 0 10px;display:flex;align-items:center;gap:8px;}
h3.sub2::before{content:"";width:8px;height:8px;background:var(--seal);border-radius:2px;transform:rotate(45deg);}
/* chips/badges */
.chip{display:inline-block;font-size:10px;font-weight:800;padding:1px 6px;border-radius:100px;line-height:1.5;white-space:nowrap;}
.f-wei{background:color-mix(in srgb,var(--wei) 15%,transparent);color:var(--wei);}
.f-shu{background:color-mix(in srgb,var(--shu) 15%,transparent);color:var(--shu);}
.f-wu{background:color-mix(in srgb,var(--wu) 15%,transparent);color:var(--wu);}
.f-qun{background:color-mix(in srgb,var(--qun) 15%,transparent);color:var(--qun);}
.tier{display:inline-block;font-family:"Nanum Myeongjo",serif;font-weight:800;font-size:11px;color:#fff;padding:1px 8px;border-radius:5px;}
.tier.T0{background:var(--t0);}.tier.T1{background:var(--t1);}.tier.T2{background:var(--t2);}
.ty{display:inline-block;font-size:10px;font-weight:800;padding:1px 6px;border-radius:4px;color:#fff;white-space:nowrap;}
.ty-지휘{background:var(--cmd);}.ty-액티브{background:var(--act);}.ty-패시브{background:var(--pas);}.ty-추격{background:var(--chase);}.ty-x{background:var(--faint);}
.gr{font-size:10px;font-weight:800;}.gr-전설{color:var(--leg);}.gr-영웅{color:var(--hero);}.gr-희귀{color:var(--rare);}.gr-평범{color:var(--rare);}
.bnew{background:var(--newbg);color:var(--new);border:1px solid var(--new);font-size:9.5px;font-weight:800;padding:0 5px;border-radius:100px;}
.bok{background:color-mix(in srgb,var(--jade) 14%,transparent);color:var(--jade);border:1px solid var(--jade);font-size:9.5px;font-weight:800;padding:0 5px;border-radius:100px;}
/* avatar */
.av{position:relative;width:38px;height:38px;border-radius:8px;overflow:hidden;background:var(--panel2);flex:none;display:inline-block;border:1px solid var(--line2);}
.av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.av b{position:absolute;inset:0;display:grid;place-content:center;font-family:"Nanum Myeongjo",serif;font-weight:800;font-size:15px;color:var(--soft);}
.av.lg{width:54px;height:54px;}.av.lg b{font-size:20px;}
.av.sm{width:30px;height:30px;border-radius:6px;}.av.sm b{font-size:12px;}
/* filters */
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:0 0 14px;}
.seg{display:inline-flex;border:1px solid var(--line2);border-radius:100px;overflow:hidden;}
.seg button{font-family:inherit;font-size:12px;font-weight:700;padding:4px 11px;border:none;background:var(--paper);color:var(--soft);cursor:pointer;}
.seg button.on{background:var(--ink);color:var(--paper);}
input.search{flex:1;min-width:150px;font-family:inherit;font-size:13px;padding:6px 12px;border-radius:8px;border:1px solid var(--line2);background:var(--paper);color:var(--ink);}
.spill{display:flex;gap:5px;flex-wrap:wrap;}
.spill button{font-family:inherit;font-size:12px;font-weight:800;padding:4px 11px;border-radius:100px;border:1px solid var(--line2);background:var(--paper);color:var(--soft);cursor:pointer;}
.spill button.on{background:var(--seal);color:#fff;border-color:var(--seal);}
/* cards grid */
.grid{display:grid;gap:10px;}
.g-forms{grid-template-columns:repeat(auto-fill,minmax(310px,1fr));}
.g-tac{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));}
.g-gen{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
/* formation card */
.fcard{border:1px solid var(--line2);border-radius:10px;background:var(--paper);overflow:hidden;}
.fcard .fh{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--panel2);border-bottom:1px solid var(--line);}
.fcard .fh .shape{font-family:"Nanum Myeongjo",serif;font-weight:800;font-size:14px;}
.frow{display:flex;align-items:center;gap:9px;padding:7px 11px;border-bottom:1px dashed var(--line);cursor:pointer;}
.frow:last-child{border-bottom:none;}
.frow .gi{flex:1;min-width:0;}
.frow .gn{font-weight:800;font-size:13.5px;}
.frow .role{font-size:10px;color:var(--faint);}
.frow .sig{font-size:11px;color:var(--seal);font-weight:700;margin-top:1px;}
.frow .tacmini{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;}
.tacmini .tm{font-size:10.5px;background:var(--panel);border:1px solid var(--line2);border-radius:100px;padding:0 7px;cursor:pointer;color:var(--ink);}
.tacmini .tm.leg{border-color:var(--leg);color:var(--leg);background:color-mix(in srgb,var(--leg) 12%,transparent);}
.tacmini .tm.hero{border-color:var(--hero);color:var(--hero);background:color-mix(in srgb,var(--hero) 12%,transparent);}
.tacmini .tm.sig{font-weight:800;}
.tacmini .tm.min{opacity:.62;font-size:10px;border-style:dashed;}
.modal.wide{max-width:960px;}
.fcgens{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:640px){.fcgens{grid-template-columns:1fr;}}
.fcg{border:1px solid var(--line2);border-radius:9px;padding:10px 11px;background:var(--panel);}
.kindtag{font-size:9px;font-weight:800;color:var(--faint);border:1px solid var(--line2);border-radius:100px;padding:0 5px;}
/* tactic card */
.tcard{border:1px solid var(--line2);border-radius:9px;background:var(--paper);padding:11px 13px;}
.tcard .th{display:flex;gap:6px;align-items:baseline;flex-wrap:wrap;margin-bottom:5px;}
.tcard .kn{font-weight:800;font-size:14px;}.tcard .wo{font-size:10.5px;}
.tcard .sj{margin-left:auto;font-size:9.5px;font-weight:800;color:#fff;background:var(--seal2);padding:1px 7px;border-radius:100px;}
.tcard .meta{font-size:10px;color:var(--faint);margin-bottom:5px;}
.tcard .eff{font-size:11.5px;color:var(--ink);line-height:1.5;}
.tcard .eff.cnonly{color:var(--soft);}
/* general card */
.gcard{border:1px solid var(--line2);border-radius:10px;background:var(--paper);padding:11px;text-align:center;cursor:pointer;}
.gcard .av{margin:0 auto 7px;display:block;}
.gcard .gn{font-weight:800;font-size:13.5px;}
.gcard .st{font-size:9.5px;color:var(--faint);font-variant-numeric:tabular-nums;margin-top:3px;}
/* stat bars */
.stbar{display:grid;grid-template-columns:20px 1fr 34px;gap:6px;align-items:center;font-size:11px;margin:2px 0;}
.stbar .bar{height:9px;background:var(--panel2);border-radius:2px;overflow:hidden;}
.stbar .bar>span{display:block;height:100%;background:var(--seal);}
/* deck builder */
.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.slot{border:1.5px dashed var(--line2);border-radius:10px;min-height:120px;padding:10px;background:var(--panel);text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.slot.filled{border-style:solid;background:var(--paper);cursor:default;}
.slot .rm{font-size:12px;color:var(--seal);cursor:pointer;border:1px solid var(--line2);border-radius:100px;padding:0 7px;}
.tslot{flex:1;border:1px dashed var(--line2);border-radius:7px;padding:6px 8px;font-size:11.5px;font-weight:700;cursor:pointer;background:var(--panel);text-align:center;min-height:30px;display:flex;align-items:center;justify-content:center;gap:4px;}
.posrow{display:flex;gap:10px;align-items:stretch;}
.poslabel{flex:0 0 44px;display:flex;align-items:center;justify-content:center;font-family:"Nanum Myeongjo",serif;font-weight:800;font-size:13px;color:#fff;border-radius:8px;background:var(--t2);}
.posrow:nth-child(1) .poslabel{background:var(--t0);}
.posrow:nth-child(2) .poslabel{background:var(--t1);}
.sjb{font-size:9px;font-weight:800;color:#fff;background:var(--faint);padding:0 5px;border-radius:100px;vertical-align:middle;}
.sjb.new{background:var(--new);}
.synbox{border:1px solid var(--line2);border-radius:10px;background:var(--panel);padding:12px 14px;margin-bottom:14px;}
.synbox .syn{padding:6px 0;border-bottom:1px solid var(--line);}
.synbox .syn:last-child{border-bottom:none;}
.synbox .syn.active .nm{color:var(--jade);}
.synbox .syn .nm{font-weight:800;}
/* bars list (meta) */
.rowbar{display:grid;grid-template-columns:150px 1fr 34px;gap:9px;align-items:center;padding:3px 0;border-bottom:1px solid var(--line);}
.rowbar .lb b{font-weight:800;}.rowbar .lb .cn{font-size:10px;}
.rowbar .bar{height:12px;background:var(--panel2);border-radius:2px;overflow:hidden;}
.rowbar .bar>span{display:block;height:100%;background:var(--seal);}
.rowbar .bar>span.nw{background:var(--new);}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:8px;}
.kpi{border:1px solid var(--line2);border-top:3px solid var(--seal);border-radius:8px;padding:12px 14px;background:var(--panel);}
.kpi .big{font-family:"Nanum Myeongjo",serif;font-size:22px;font-weight:800;color:var(--seal);}
.kpi h4{margin:0 0 5px;font-size:12px;font-weight:800;}.kpi p{margin:7px 0 0;font-size:11px;color:var(--soft);}
.note{background:var(--panel);border:1px solid var(--line2);border-left:4px solid var(--bronze);border-radius:6px;padding:10px 13px;font-size:11.5px;color:var(--soft);margin:12px 0;}
.note b{color:var(--ink);}
.tag{display:inline-flex;gap:5px;align-items:baseline;border-radius:100px;padding:2px 9px;font-size:11.5px;font-weight:700;border:1px solid var(--line2);background:var(--paper);margin:2px;}
.tag.ok{background:color-mix(in srgb,var(--jade) 12%,transparent);border-color:var(--jade);}
.tag.new{background:var(--newbg);border-color:var(--new);}.tag .c{font-size:9.5px;color:var(--faint);}
table{border-collapse:collapse;width:100%;font-size:12px;}
th{text-align:left;padding:6px 8px;background:var(--panel2);border-bottom:2px solid var(--line2);font-size:10.5px;text-transform:uppercase;color:var(--soft);}
td{padding:5px 8px;border-bottom:1px solid var(--line);}
.scroll{overflow-x:auto;border:1px solid var(--line2);border-radius:8px;}
.mut{color:var(--faint);font-size:11px;}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(20,15,10,.55);z-index:50;display:none;align-items:center;justify-content:center;padding:16px;}
.overlay.on{display:flex;}
.modal{background:var(--paper);border:1px solid var(--line2);border-radius:14px;max-width:560px;width:100%;max-height:86vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.modal .mh{position:sticky;top:0;background:var(--paper);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:10px;}
.modal .mb{padding:16px 18px;}
.modal .x{margin-left:auto;font-size:18px;cursor:pointer;color:var(--faint);border:none;background:none;}
.footer{max-width:1180px;margin:24px auto 0;padding:14px 16px;border-top:1px solid var(--line2);font-size:11px;color:var(--faint);}
@media(max-width:640px){.slots{grid-template-columns:1fr;}.kpis{grid-template-columns:1fr;}.rowbar{grid-template-columns:120px 1fr 30px;}}
</style>
</head>
<body>
<header>
 <div class="hbar">
  <div class="logo"><span class="mk serif">天</span><span>천하결전 <em>메타랩</em></span></div>
  <span class="sp"></span>
  <span class="mut" id="stat"></span>
  <button class="tbtn" onclick="toggleTheme()">◐</button>
 </div>
 <nav class="tabs" id="tabs"></nav>
</header>
<main>
 <section id="tab-meta"></section>
 <section id="tab-season"></section>
 <section id="tab-srank"></section>
 <section id="tab-builder"></section>
 <section id="tab-tac"></section>
 <section id="tab-gen"></section>
 <section id="tab-ref"></section>
</main>
<div class="footer">
 <div style="margin-bottom:6px">정적 문서(인쇄용): <a href="overview.html">S1 종합자료</a> · <a href="roster.html">S1~15 로스터</a> · <a href="new-tactics.html">신규전법 상세</a> · <a href="s2s3-guide.html">S2·S3 가이드</a></div>
 데이터: sgmdtx.com(中 편성·전법·장수) · 힛파/biligames(한글) · say-bot 덱시뮬 참고 · S1~S15(S16 미공개) · 신규 항목은 임시 번역(색표시) · 개인 학습용
</div>
<div class="overlay" id="ov" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal"></div></div>
<script src="data.js?v=2"></script>
<script>
const D=window.DATA, TAC=D.TAC, GEN=D.GEN, SEA=D.SEASONS, SYN=D.SYN, META=D.META;
const FAC={wei:'위',shu:'촉',wu:'오',qun:'군'};
const SEASONS=Object.keys(SEA).map(Number).sort((a,b)=>a-b);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const AVBASE='https://cdn.sgmdtx.com/img/avatar/';
function avHtml(cn,cls){const g=GEN[cn]||{};const kr=g.kr||cn;const av=g.av;const ini=esc((kr||cn)[0]);
 return `<span class="av ${cls||''}">${av?`<img loading="lazy" src="${AVBASE}${esc(av)}" onerror="this.remove()">`:''}<b>${ini}</b></span>`;}
function facChip(cn){const f=(GEN[cn]||{}).faction;return f?`<span class="chip f-${f}">${FAC[f]}</span>`:'';}
function sjBadge(cn){const g=GEN[cn]||{};return g.sj?`<span class="sjb ${g.official===false?'new':''}">${esc(g.sj)}</span>`:'';}
function tyB(t){return t?`<span class="ty ty-${t}">${t}</span>`:'';}
function tName(cn){return (TAC[cn]||{}).kr||cn;}
function isNewTac(cn){const t=TAC[cn];return t&&t.official===false;}
function gradeCls(cn){const g=(TAC[cn]||{}).grade;return g==='전설'?'leg':(g==='영웅'?'hero':'');}

/* ---------------- TABS ---------------- */
const TABS=[['meta','메타'],['season','시즌별 편성'],['srank','시즌 랭킹'],['builder','덱빌더'],['tac','전법 도감'],['gen','장수 도감'],['ref','참고']];
let built={};
function show(id){
 TABS.forEach(([k])=>{document.getElementById('tab-'+k).classList.toggle('on',k===id);});
 [...document.querySelectorAll('#tabs button')].forEach(b=>b.classList.toggle('on',b.dataset.k===id));
 if(!built[id]){({meta:renderMeta,season:renderSeason,srank:renderSrank,builder:renderBuilder,tac:renderTac,gen:renderGen,ref:renderRef}[id])();built[id]=1;}
 location.hash=id;
}
document.getElementById('tabs').innerHTML=TABS.map(([k,l])=>`<button data-k="${k}" onclick="show('${k}')">${l}</button>`).join('');
function toggleTheme(){const r=document.documentElement;const c=r.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');r.setAttribute('data-theme',c==='dark'?'light':'dark');}

/* ---------------- MODAL ---------------- */
function openModal(html,wide){const m=document.getElementById('modal');m.innerHTML=html;m.classList.toggle('wide',!!wide);document.getElementById('ov').classList.add('on');}
function closeModal(){document.getElementById('ov').classList.remove('on');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

}
function tslot(i,j){const t=deckTacs[i][j];const x=t?(TAC[t]||{}):null;
 return `<div class="tslot" onclick="openTacPicker(${i},${j})">${t?`<b style="${x.grade==='전설'?'color:var(--leg)':x.grade==='영웅'?'color:var(--hero)':''}">${esc(tName(t))}</b> ${x.ty?tyB(x.ty):''}`:`<span class="mut">+ 전법 ${j+1}</span>`}</div>`;}
function drawDeck(){
 // shape info
 const F=D.FORMS.find(f=>f.name===deckShape)||{};
 document.getElementById('shapeSel').value=deckShape;
 document.getElementById('shapeInfo').innerHTML=F.hit?`피격률 전${F.hit[0]||'-'}·중${F.hit[1]||'-'}·후${F.hit[2]||'-'} · ${(F.feats||[]).join(' / ')}`:'';
 // position rows
 document.getElementById('posSlots').innerHTML=deck.map((cn,i)=>{
  const label=`<div class="poslabel">${POS[i]}</div>`;
  if(!cn) return `<div class="posrow">${label}<div class="slot" style="min-height:64px;flex:1;cursor:default"><span class="mut">${POS[i]} 비어 있음 — 아래에서 장수 선택</span></div></div>`;
  const g=GEN[cn]||{};
  return `<div class="posrow">${label}<div class="slot filled" style="flex:1">
    <div style="display:flex;gap:9px;align-items:center;width:100%">${avHtml(cn,'lg')}
     <div style="text-align:left;flex:1"><b>${esc(g.kr)}</b> ${facChip(cn)} ${g.bing?`<span class="chip" style="background:var(--panel2);color:var(--soft)">${esc(g.bing)}${g.bingEst?'·추정':''}</span>`:''} ${sjBadge(cn)}
       <div class="mut" style="font-size:10px">무${g.wl||'-'}·지${g.zl||'-'}·통${g.ts||'-'}·선${g.xg||'-'} · <span onclick="tacModal('${g.skill}');event.stopPropagation()" style="color:var(--seal);font-weight:700;cursor:pointer">◈ ${esc(tName(g.skill))}</span></div>
     </div>
     <span class="rm" onclick="deck[${i}]=null;deckTacs[${i}]=[];drawDeck();renderPool()">×</span></div>
    <div style="display:flex;gap:6px;width:100%">${tslot(i,0)}${tslot(i,1)}</div>
  </div></div>`;
 }).join('');
 // panel: team stats + synergy + tactic effects
 const sel=deck.filter(Boolean);
 const sum={wl:0,zl:0,ts:0,xg:0}; sel.forEach(cn=>{const g=GEN[cn]||{};['wl','zl','ts','xg'].forEach(k=>sum[k]+=(g[k]||0));});
 const statLine=sel.length?`<div class="mut" style="font-size:11.5px;margin-bottom:6px">팀 합계 — 무 ${sum.wl} · 지 ${sum.zl} · 통 ${sum.ts} · 선 ${sum.xg}</div>`:'';
 const active=SYN.map(s=>{const n=s.member.filter(m=>sel.includes(m)).length;return {s,n};}).filter(x=>x.n>=2).sort((a,b)=>b.n-a.n);
 const synHtml=`<h3 class="sub2" style="margin-top:0">활성 연계 <span class="mut" style="font-weight:400">(2인 이상 공유)</span></h3>`+
  (active.length?active.map(({s,n})=>`<div class="syn active"><span class="nm">${esc(s.name)}</span> <span class="mut">(${n}/${s.member.length})</span> <span style="font-size:11.5px;color:var(--soft)">${esc(s.desc||'')}</span></div>`).join(''):'<span class="mut">장수 2명 이상 선택 시 공유 연계 표시</span>');
 const chosen=[]; deck.forEach((cn,i)=>{if(cn){const g=GEN[cn]||{};if(g.skill)chosen.push([g.skill,'◈ '+g.kr]);deckTacs[i].forEach(t=>{if(t)chosen.push([t,g.kr]);});}});
 const effHtml=chosen.length?`<h3 class="sub2">편성 스킬·전법 효과</h3>`+chosen.map(([t,who])=>{const x=TAC[t]||{};return `<div class="syn"><span class="nm" style="${x.grade==='전설'?'color:var(--leg)':x.grade==='영웅'?'color:var(--hero)':''}">${esc(tName(t))}</span> ${x.ty?tyB(x.ty):''} <span class="mut">${esc(who)}</span><div style="font-size:11.5px;color:var(--soft)">${esc(x.eff||'—')}</div></div>`;}).join(''):'';
 document.getElementById('synbox').innerHTML=statLine+synHtml+effHtml;
}
function pick(cn){if(deck.includes(cn))return;const i=deck.indexOf(null);if(i<0){alert('세 위치가 가득 찼습니다. × 로 비운 뒤 선택하세요.');return;}deck[i]=cn;deckTacs[i]=[];drawDeck();renderPool();}
function renderPool(){
 const q=(document.getElementById('bsearch').value||'').trim();
 const fac=document.querySelector('#bfac button.on').dataset.f;
 let list=Object.keys(GEN).filter(cn=>{const g=GEN[cn];return (fac==='all'||g.faction===fac)&&(!q||(g.kr||'').includes(q)||cn.includes(q));});
 list.sort((a,b)=>((GEN[b].official?1:0)-(GEN[a].official?1:0))||((GEN[b].wl+GEN[b].zl||0)-(GEN[a].wl+GEN[a].zl||0)));
 document.getElementById('bpool').innerHTML=list.map(cn=>{const g=GEN[cn];const inDeck=deck.includes(cn);return `<div class="gcard" style="${inDeck?'opacity:.45':''}" onclick="pick('${cn}')">${avHtml(cn,'lg')}<div class="gn">${facChip(cn)} ${esc(g.kr)}</div><div class="st">${g.bing?esc(g.bing)+' · ':''}무${g.wl||'-'}·지${g.zl||'-'}</div></div>`;}).join('');
}

/* ---------------- TACTIC DICTIONARY ---------------- */
let tacState={ty:'all',off:'all',q:''};
function renderTac(){
 const el=document.getElementById('tab-tac');
 el.innerHTML=`<h2 class="head serif">전법 도감</h2><p class="sub">S1 공식 77종 + 후속 시즌 신규 전법. 유형·시즌 필터, 검색. 클릭 시 상세 효과.</p>
 <div class="filters">
  <div class="seg" id="tyseg">${[['all','전유형'],['지휘','지휘'],['액티브','액티브'],['패시브','패시브'],['추격','추격']].map(([k,l])=>`<button data-t="${k}" class="${k===tacState.ty?'on':''}">${l}</button>`).join('')}</div>
  <div class="seg" id="offseg">${[['all','전체'],['off','공식(KR)'],['new','신규(번역)']].map(([k,l])=>`<button data-o="${k}" class="${k===tacState.off?'on':''}">${l}</button>`).join('')}</div>
  <input class="search" id="tsearch" placeholder="전법명·원문·효과 검색…" value="${esc(tacState.q)}">
 </div><div class="mut" id="tcount" style="margin-bottom:8px"></div>
 <div class="grid g-tac" id="tgrid"></div>`;
 document.getElementById('tyseg').onclick=e=>{const b=e.target.closest('button');if(!b)return;tacState.ty=b.dataset.t;renderTac();};
 document.getElementById('offseg').onclick=e=>{const b=e.target.closest('button');if(!b)return;tacState.off=b.dataset.o;renderTac();};
 document.getElementById('tsearch').oninput=e=>{tacState.q=e.target.value;fillTac();};
 fillTac();
}
function fillTac(){
 const q=tacState.q.trim();
 let list=Object.values(TAC).filter(t=>!t.minimal); // exclude 본명/계승 name-only
 if(tacState.ty!=='all')list=list.filter(t=>t.ty===tacState.ty);
 if(tacState.off==='off')list=list.filter(t=>t.official);
 if(tacState.off==='new')list=list.filter(t=>t.official===false);
 if(q)list=list.filter(t=>(t.kr||'').includes(q)||(t.cn||'').includes(q)||(t.eff||'').includes(q)||(t.effcn||'').includes(q));
 const ord={'지휘':0,'액티브':1,'패시브':2,'추격':3};
 list.sort((a,b)=>(a.official===b.official?0:(a.official?-1:1))||(ord[a.ty]??9)-(ord[b.ty]??9));
 document.getElementById('tcount').textContent=list.length+'종';
 document.getElementById('tgrid').innerHTML=list.map(t=>{const eff=t.eff||'';return `<div class="tcard" onclick="tacModal('${t.cn}')">
   <div class="th"><span class="kn ${gradeCls(t.cn)?'g'+gradeCls(t.cn):''}" style="${t.grade==='전설'?'color:var(--leg)':t.grade==='영웅'?'color:var(--hero)':''}">${esc(t.kr)}</span>${t.official===false?'<span class="bnew">번역</span>':''}${t.sj?`<span class="sj">${esc(t.sj)}</span>`:''}</div>
   <div class="meta">${tyB(t.ty)} ${t.tx?esc(t.tx):''} ${t.grade?`· <span class="gr gr-${t.grade}">${t.grade}</span>`:''} ${t.gl?'· 발동 '+esc(t.gl):''}</div>
   <div class="eff ${t.eff?'':'cnonly'}">${esc(eff).slice(0,150)}${eff.length>150?'…':''}</div></div>`;}).join('')||'<p class="mut">결과 없음</p>';
}

/* ---------------- GENERAL DICTIONARY ---------------- */
let genState={fac:'all',bz:'all',q:''};
function renderGen(){
 const el=document.getElementById('tab-gen');
 el.innerHTML=`<h2 class="head serif">장수 도감</h2><p class="sub">S1~S15 편성 등장 장수 ${Object.keys(GEN).length}명. 스탯은 50렙 환산. 클릭 시 상세.</p>
 <div class="filters">
  <div class="seg" id="gfac">${[['all','전진영'],['wei','위'],['shu','촉'],['wu','오'],['qun','군']].map(([k,l])=>`<button data-f="${k}" class="${k===genState.fac?'on':''}">${l}</button>`).join('')}</div>
  <input class="search" id="gsearch" placeholder="장수 검색…" value="${esc(genState.q)}">
 </div><div class="mut" id="gcount" style="margin-bottom:8px"></div>
 <div class="grid g-gen" id="ggrid"></div>`;
 document.getElementById('gfac').onclick=e=>{const b=e.target.closest('button');if(!b)return;genState.fac=b.dataset.f;renderGen();};
 document.getElementById('gsearch').oninput=e=>{genState.q=e.target.value;fillGen();};
 fillGen();
}
function fillGen(){
 const q=genState.q.trim();
 let list=Object.keys(GEN).filter(cn=>{const g=GEN[cn];return (genState.fac==='all'||g.faction===genState.fac)&&(!q||(g.kr||'').includes(q)||cn.includes(q));});
 list.sort((a,b)=>((GEN[b].official?1:0)-(GEN[a].official?1:0))||((GEN[b].wl+GEN[b].zl+GEN[b].ts||0)-(GEN[a].wl+GEN[a].zl+GEN[a].ts||0)));
 document.getElementById('gcount').textContent=list.length+'명';
 document.getElementById('ggrid').innerHTML=list.map(cn=>{const g=GEN[cn];return `<div class="gcard" onclick="genModal('${cn}')">${avHtml(cn,'lg')}<div class="gn">${facChip(cn)} ${esc(g.kr)} ${g.official===false?'<span class="bnew">번</span>':''}</div><div class="st">${g.bing?esc(g.bing)+' · ':''}${g.sj||''}</div><div class="st">무${g.wl||'-'}·지${g.zl||'-'}·통${g.ts||'-'}</div></div>`;}).join('');
}

/* ---------------- REFERENCE ---------------- */
function renderRef(){
 const el=document.getElementById('tab-ref');
 const forms=D.FORMS.map(f=>`<tr><td><b>${esc(f.name)}</b></td><td class="num">${(f.hit||[]).map(h=>h||'-').join(' / ')}</td><td class="mut">${(f.feats||[]).map(esc).join('<br>')}</td></tr>`).join('');
 const eq=(arr)=>arr.map(e=>`<tr><td><b>${esc(e.name)}</b></td><td class="mut" style="font-size:11px">${esc(e.desc)}</td></tr>`).join('');
 el.innerHTML=`<h2 class="head serif">참고 자료</h2><p class="sub">진형(위치별 피격률·특성) · 장비 특기(대장간/말시장) 글로서리.</p>
 <h3 class="sub2">진형</h3><div class="scroll"><table><thead><tr><th>진형</th><th>피격률(전/중/후)</th><th>특성</th></tr></thead><tbody>${forms}</tbody></table></div>
 <h3 class="sub2">대장간 특기</h3><div class="scroll"><table><tbody>${eq(D.EQUIP.forge)}</tbody></table></div>
 <h3 class="sub2">말 시장 특기</h3><div class="scroll"><table><tbody>${eq(D.EQUIP.horse)}</tbody></table></div>`;
}

/* ---------------- INIT ---------------- */
document.getElementById('stat').textContent=`${SEASONS.length}시즌 · 편성 ${Object.values(SEA).reduce((a,b)=>a+b.length,0)} · 전법 ${Object.keys(TAC).length} · 장수 ${Object.keys(GEN).length}`;
const start=(location.hash||'#meta').slice(1);
show(TABS.some(([k])=>k===start)?start:'meta');
</script>
</body>
</html>
